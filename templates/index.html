<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maritime Domain Awareness System (MDA) - Tactical UI</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Courier New', monospace; background-color: #0b0f19; color: #00ffcc; }
        #header { height: 50px; background: #111a2e; display: flex; align-items: center; padding-left: 20px; border-bottom: 2px solid #00ffcc; }
        #map { height: calc(100vh - 50px); width: 100%; }
        .critical-alert { animation: blinker 1s linear infinite; color: #ff3333; font-weight: bold; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="header">
        <h2>⚡ MDA SYSTEM BRIEFING: GULF OF GUINEA OPERATIONS</h2>
    </div>
    <div id="map"></div>

    <script>
        // 1. Initialize the Map View over the Gulf of Guinea
        const map = L.map('map').setView([4.5, 5.5], 7);

        // 2. Load the Dark Tactical Map Skin
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: 'MDA Tactical Framework'
        }).addTo(map);

        // 3. Render the Bounding Box Boundaries 
        const eezZone = L.polygon([
            [6.3, 2.5], [6.3, 8.5], [2.0, 8.5], [2.0, 2.5]
        ], {
            color: '#00ffcc', weight: 2, fillColor: '#00ffcc', fillOpacity: 0.04
        }).addTo(map).bindPopup("<b>Exclusive Economic Zone (EEZ) Perimeter</b>");

        let activeMarkers = {};

        // 4. THE CLEANED WEBSOCKET BLOCK (PASTE HERE)
        const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        const socket = new WebSocket(`${protocol}${window.location.host}/ws/mda`);

        socket.onopen = function(e) {
            console.log("[+] Live Tactical Feed Connected Securely.");
        };

        socket.onmessage = function(event) {
            const trackingData = JSON.parse(event.data);
            console.log("Tactical Update Received:", trackingData); 

            trackingData.forEach(target => {
                let color = "#00ff00"; 
                let radius = 6;

                if (target.risk === "Critical") {
                    color = "#ff3333"; 
                    radius = 9;
                } else if (target.risk === "Medium") {
                    color = "#ffcc00"; 
                    radius = 7;
                }

                const popupContent = `
                    <div style="color:#111; font-family: sans-serif;">
                        <b>Target Track:</b> ${target.id}<br>
                        <b>Identity:</b> ${target.name}<br>
                        <b>Coordinates:</b> [${target.lat.toFixed(4)}, ${target.lng.toFixed(4)}]<br>
                        <b style="color:${color === '#ff3333' ? 'red' : 'orange'}">Classification: ${target.anomaly}</b><br>
                        <b>Inside EEZ Boundary:</b> ${target.inside_eez ? "YES" : "NO"}
                    </div>
                `;

                if (activeMarkers[target.id]) {
                    activeMarkers[target.id].setLatLng([target.lat, target.lng]);
                    activeMarkers[target.id].setPopupContent(popupContent);
                    activeMarkers[target.id].setStyle({ color: color, radius: radius, fillColor: color });
                } else {
                    const marker = L.circleMarker([target.lat, target.lng], {
                        color: color, radius: radius, fillColor: color, fillOpacity: 0.8, weight: 2
                    }).addTo(map).bindPopup(popupContent);

                    activeMarkers[target.id] = marker;
                }
            });
        };
    </script>
